# robotsix-auto-mail configuration — managed by central-deploy.
# Edit via the Configuration page at deploy.robotsix.net/mail.
# All schema fields are present; leave optional fields at their defaults unless needed.
# Secret fields carry the literal sentinel "SECRET" — central-deploy renders
# those as masked password inputs (detection is by this explicit marker, NOT
# by field name). Fill the real value in the Configuration UI; the deployed
# config never contains the literal "SECRET". Non-"SECRET" leaves (e.g.
# public_key below) are ordinary editable fields.

# ── Global: LLM ──────────────────────────────────────────────────────────
llm:
  api_key: SECRET                   # secret — LLM API key (e.g. OpenRouter sk-or-…)  # pragma: allowlist secret
  # provider_model: ""              # optional — override llmio tier default

# ── Global: Langfuse observability (optional) ─────────────────────────────
langfuse:
  public_key: ""                    # non-secret — Langfuse public key (now an ordinary editable field)
  secret_key: SECRET                # secret  # pragma: allowlist secret
  base_url: ""

# ── Global: Logging ───────────────────────────────────────────────────────
logging:
  level: INFO
  format: console
  file_dir: .mail_log

# ── Accounts ──────────────────────────────────────────────────────────────
default_account: main

accounts:
  - id: main
    label: Main mailbox

    imap:
      host: ""                      # required — IMAP server hostname (e.g. imap.gmail.com)
      port: 993
      tls_mode: direct-tls
      folder: INBOX

    smtp:
      host: ""                      # required — SMTP server hostname (e.g. smtp.gmail.com)
      port: 587
      tls_mode: starttls

    auth:
      username: ""                  # required — login / email address
      password: SECRET              # secret — email password or app password  # pragma: allowlist secret
      oauth2_token: SECRET          # secret — leave masked if using password auth  # pragma: allowlist secret
      oauth2_client_id: ""
      oauth2_client_secret: SECRET  # secret  # pragma: allowlist secret
      oauth2_provider: ""
      oauth2_tenant: organizations

    store:
      path: .data/mail.db           # resolves to /home/mailbot/.data/mail.db in container

    ingest:
      interval_minutes: 15

    archive:
      root: robotsix-mail-archive
      enabled: true

    triage:
      on_ingest: true

    # component_agent:
    #   enabled: false

    calendar:
      enabled: true
      transport: in-process
      broker_host: ""
      broker_port: 443
      broker_tls_ca: ""
      broker_client_cert: ""
      broker_client_key: ""
      broker_token: SECRET          # secret  # pragma: allowlist secret
