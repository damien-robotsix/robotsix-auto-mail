# robotsix-auto-mail configuration — managed by central-deploy.
# Edit via the Configuration page at deploy.robotsix.net/mail.
# All schema fields are present; leave optional fields at their defaults unless needed.
# Secret fields are intentionally blank — fill them in the Configuration UI.

# ── Global: LLM ──────────────────────────────────────────────────────────
llm:
  api_key: ""                       # secret — LLM API key (e.g. OpenRouter sk-or-…)

# ── Global: Langfuse observability (optional) ─────────────────────────────
langfuse:
  public_key: ""
  secret_key: ""                    # secret
  base_url: ""

# ── Global: Logging ───────────────────────────────────────────────────────
logging:
  level: INFO
  format: console
  file_dir: .mail_log

# ── Accounts ──────────────────────────────────────────────────────────────
default_account: main

accounts:
  - id: main
    label: Main mailbox

    imap:
      host: ""                      # required — IMAP server hostname (e.g. imap.gmail.com)
      port: 993
      tls_mode: direct-tls
      folder: INBOX

    smtp:
      host: ""                      # required — SMTP server hostname (e.g. smtp.gmail.com)
      port: 587
      tls_mode: starttls

    auth:
      username: ""                  # required — login / email address
      password: ""                  # secret — email password or app password
      oauth2_token: ""              # secret — leave blank if using password auth
      oauth2_client_id: ""
      oauth2_client_secret: ""      # secret
      oauth2_provider: ""
      oauth2_tenant: organizations

    store:
      path: .data/mail.db           # resolves to /home/mailbot/.data/mail.db in container

    ingest:
      interval_minutes: 15

    archive:
      root: robotsix-mail-archive
      namespace: ""
      enabled: true

    triage:
      on_ingest: true

    # component_agent:
    #   enabled: false

    calendar:
      enabled: true
      transport: in-process
      broker_host: ""
      broker_port: 443
      broker_tls_ca: ""
      broker_client_cert: ""
      broker_client_key: ""
      broker_token: ""              # secret
