# Example configuration for robotsix-auto-mail (multi-account shape).
#
# Copy this file to config/mail.local.yaml and fill in your real values.
# config/mail.local.yaml is git-ignored so credentials never land in the repo.
#
# Each account is an independent mailbox with its own stable `id`, optional
# human-friendly `label`, and its own SQLite database (`store.path`). Every
# account MUST use a distinct store.path; when omitted it defaults to
# `.data/<id>/mail.db`, which is unique per account.
#
# Any field you omit falls back to its built-in default (shown commented
# below). The namespaced MAIL_ACCOUNTS_<n>_* environment variables override
# the corresponding value here.
#
# NOTE: the legacy single-account shape (top-level imap:/smtp:/auth: with no
# `accounts:` key) is DEPRECATED but still loads. Run
# `robotsix-auto-mail migrate-config` to convert an old config to this shape.
#
# llm:, langfuse:, and board_agent: are application-wide (top-level) sections — they apply
# to every account.  Bare LLM_API_KEY / LANGFUSE_* env vars override them.

# LLM provider — used by the `detect` command and future LLM-assisted mail
# processing.  The LLM_API_KEY / LLM_PROVIDER environment variables override
# these values.
# llm:
#   api_key: sk-or-v1-…
#   provider: openrouter-deepseek

# Langfuse observability — optional.  When public_key/secret_key are set,
# every LLM agent run is traced to the configured Langfuse project.
# langfuse:
#   public_key: ""
#   secret_key: ""
#   base_url: ""

# Board agent — optional agent-comm bridge to the mill board.
# When enabled, other agents can drive the board programmatically.
# board_agent:
#   enabled: false
#   api_url: ""
#   api_token: ""
#   repo_id: ""
#   write_ops: true

# Optional: name the default account. Absent → the first entry below.
default_account: personal

accounts:
  - id: personal
    label: Personal Gmail
    imap:
      host: imap.gmail.com
      # port: 993
      # tls_mode: direct-tls
      # folder: INBOX
    smtp:
      host: smtp.gmail.com
      # port: 587
      # tls_mode: starttls
    auth:
      username: me@gmail.com
      password: ""  # set your password here, or via MAIL_ACCOUNTS_0_PASSWORD
      # OAuth2 / XOAUTH2 — for Gmail, Microsoft 365, or any provider that
      # requires modern SASL XOAUTH2 instead of password-based login().
      # When oauth2_token is set, password auth is not used.
      # oauth2_token: ""          # or via MAIL_ACCOUNTS_0_OAUTH2_TOKEN
      # oauth2_client_id: ""      # or via MAIL_ACCOUNTS_0_OAUTH2_CLIENT_ID
      # oauth2_client_secret: ""  # or via MAIL_ACCOUNTS_0_OAUTH2_CLIENT_SECRET
      # MSAL-managed OAuth2 (Microsoft 365). Set oauth2_provider to
      # "microsoft" to acquire/refresh tokens via MSAL instead of a password.
      # oauth2_provider: ""              # "microsoft" to enable MSAL
      # oauth2_tenant: organizations     # Azure AD tenant
    store:
      path: .data/personal/mail.db
    # Automatic ingestion (used by `ingest --watch`). How often, in minutes,
    # to fetch new mail. Overridable via MAIL_ACCOUNTS_0_INGEST_INTERVAL.
    # ingest:
    #   interval_minutes: 15
    # Self-managed archive folder structure.
    # archive:
    #   root: robotsix-mail-archive
    #   namespace: ""
    #   enabled: true
    # Inbox triage agent — runs automatically after each ingest cycle.
    # triage:
    #   on_ingest: true
    # Calendar (Add to Calendar) — agent-comm dispatch to the
    # robotsix-calendar agent.  When enabled, the detail view shows
    # an 'Add to Calendar' button that sends a CalendarEventRequest
    # message via the robotsix_agent_comm message bus.
    # calendar:
    #   enabled: true
    #   # Transport mode: "in-process" (default) or "brokered".
    #   transport: in-process
    #   # Broker settings (required when transport: brokered).
    #   broker_host: ""
    #   broker_port: 8443
    #   broker_tls_ca: ""
    #   broker_client_cert: ""
    #   broker_client_key: ""
    #   broker_token: ""
    # Logging configuration — application-wide.
    # logging:
    #   level: INFO
    #   format: console
    #   file_dir: .mail_log

  - id: work
    label: Work mailbox
    imap:
      host: imap.work.example.com
    smtp:
      host: smtp.work.example.com
    auth:
      username: me@work.example.com
      password: ""  # set here, or via MAIL_ACCOUNTS_1_PASSWORD
    store:
      path: .data/work/mail.db
    # Calendar (Add to Calendar) — agent-comm dispatch to the
    # robotsix-calendar agent.  When enabled, the detail view shows
    # an 'Add to Calendar' button that sends a CalendarEventRequest
    # message via the robotsix_agent_comm message bus.
    # calendar:
    #   enabled: true
    #   # Transport mode: "in-process" (default) or "brokered".
    #   transport: in-process
    #   # Broker settings (required when transport: brokered).
    #   broker_host: ""
    #   broker_port: 8443
    #   broker_tls_ca: ""
    #   broker_client_cert: ""
    #   broker_client_key: ""
    #   broker_token: ""
