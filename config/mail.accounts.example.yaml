# Example multi-account configuration for robotsix-auto-mail.
#
# Copy this file to config/mail.local.yaml (or point MAIL_CONFIG_PATH at it)
# and fill in your real values.  Each account is an independent mailbox with
# its own stable `id`, optional human-friendly `label`, and its own SQLite
# database (`store.path`).  Per the "one DB per account" decision, every
# account MUST use a distinct store.path — when omitted it defaults to
# `.data/mail-<id>.db`, which is unique per account.
#
# Single-account configs (the config/mail.local.example.yaml shape, with no
# top-level `accounts:` key) remain fully supported and load as a one-element
# container with account_id "default".

# Optional: name the default account.  Absent → the first entry below.
default_account: personal

accounts:
  - id: personal
    label: Personal Gmail
    imap:
      host: imap.gmail.com
      port: 993
      tls_mode: direct-tls
    smtp:
      host: smtp.gmail.com
      port: 587
      tls_mode: starttls
    auth:
      username: me@gmail.com
      password: ""  # set here, or via MAIL_ACCOUNTS_0_PASSWORD
    store:
      path: .data/mail-personal.db

  - id: work
    label: Work mailbox
    imap:
      host: imap.work.example.com
      port: 993
      tls_mode: direct-tls
    smtp:
      host: smtp.work.example.com
      port: 587
      tls_mode: starttls
    auth:
      username: me@work.example.com
      password: ""  # set here, or via MAIL_ACCOUNTS_1_PASSWORD
    store:
      path: .data/mail-work.db
