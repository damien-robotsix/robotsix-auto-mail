# -------------------------------------------------------------------------
# mail.robotsix.net — reverse proxy for the robotsix-auto-mail board.
#
# This is the HTTP-only BOOTSTRAP vhost. Install it, then run
# `certbot --nginx -d mail.robotsix.net --redirect` to add TLS and the
# HTTPS redirect, then add basic auth to the generated 443 block.
# See deploy/README.md ("nginx + TLS + basic auth") for the full sequence.
#
# The board (deploy/docker-compose.yml `board` service) listens on
# 127.0.0.1:8080 with NO authentication of its own — basic auth on the
# HTTPS block is what protects it.
# -------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name mail.robotsix.net;

    # The board issues background POSTs for card moves; keep the limit generous.
    client_max_body_size 5m;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
