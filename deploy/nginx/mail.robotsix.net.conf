# -------------------------------------------------------------------------
# mail.robotsix.net — reverse proxy for the robotsix-auto-mail board.
#
# The board (deploy/docker-compose.yml `board` service) listens on
# 127.0.0.1:8080 with NO authentication of its own. This vhost terminates
# TLS and enforces HTTP basic auth before proxying to it.
#
# Install on the shared nginx host as:
#   /etc/nginx/sites-available/mail.robotsix.net
#   ln -s ../sites-available/mail.robotsix.net /etc/nginx/sites-enabled/
# Obtain the certificate FIRST (see deploy/README.md), then `nginx -t` and
# `systemctl reload nginx`. The htpasswd file is created per deploy/README.md.
# -------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name mail.robotsix.net;

    # Let certbot's webroot/standalone renewal through; redirect the rest.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mail.robotsix.net;

    ssl_certificate     /etc/letsencrypt/live/mail.robotsix.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.robotsix.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # The board has no auth of its own — gate all access here.
    auth_basic           "robotsix-auto-mail";
    auth_basic_user_file /etc/nginx/htpasswd/mail.robotsix.net;

    # The board issues background POSTs for card moves; keep the body limit
    # generous and disable proxy buffering for snappy interactions.
    client_max_body_size 5m;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
