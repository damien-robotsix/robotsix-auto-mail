# central-deploy-contract-version: 1

name: robotsix-auto-mail

services:
  robotsix-auto-mail:
    image: ghcr.io/damien-robotsix/robotsix-auto-mail:main
    command: ingest --watch
    restart: unless-stopped
    environment:
      MAIL_CONFIG_PATH: /home/mailbot/config/config.yaml
    volumes:
      - auto-mail-config:/home/mailbot/config
      - auto-mail-data:/home/mailbot/.data
      - auto-mail-logs:/home/mailbot/.mail_log
    healthcheck:
      test: ["NONE"]

  board:
    image: ghcr.io/damien-robotsix/robotsix-auto-mail:main
    command: serve --port 8080
    restart: unless-stopped
    environment:
      MAIL_CONFIG_PATH: /home/mailbot/config/config.yaml
    ports:
      - "8080:8080"
    volumes:
      - auto-mail-config:/home/mailbot/config
      - auto-mail-data:/home/mailbot/.data
      - auto-mail-logs:/home/mailbot/.mail_log
    labels:
      robotsix.deploy.primary: "true"
      robotsix.deploy.config-target: "/home/mailbot/config/config.yaml"
      robotsix.deploy.config-assist: "detect {accounts.0.auth.username} --id {accounts.0.id} --overwrite --password {accounts.0.auth.password} --no-verify --output /home/mailbot/config/config.yaml"
      robotsix.deploy.config-assist-seeds: "accounts.0.auth.username,accounts.0.auth.password"

volumes:
  auto-mail-config:
  auto-mail-data:
  auto-mail-logs:
