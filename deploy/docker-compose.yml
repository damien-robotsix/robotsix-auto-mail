# central-deploy-contract-version: 1

name: robotsix-auto-mail

services:
  robotsix-auto-mail:
    image: ghcr.io/damien-robotsix/robotsix-auto-mail:main
    command: ingest --watch
    restart: unless-stopped
    environment:
      MAIL_CONFIG_PATH: /home/mailbot/config/config.yaml
    volumes:
      - auto-mail-config:/home/mailbot/config
      - auto-mail-data:/home/mailbot/.data
      - auto-mail-logs:/home/mailbot/.mail_log
    healthcheck:
      disable: true

  board:
    image: ghcr.io/damien-robotsix/robotsix-auto-mail:main
    command: serve --port 8080
    restart: unless-stopped
    environment:
      MAIL_CONFIG_PATH: /home/mailbot/config/config.yaml
    ports:
      - "8080:8080"
    volumes:
      - auto-mail-config:/home/mailbot/config
      - auto-mail-data:/home/mailbot/.data
      - auto-mail-logs:/home/mailbot/.mail_log
    labels:
      robotsix.deploy.primary: "true"

volumes:
  auto-mail-config:
  auto-mail-data:
  auto-mail-logs:
