# central-deploy-contract-version: 1

name: robotsix-auto-mail

services:
  ingester:
    image: ghcr.io/damien-robotsix/robotsix-auto-mail:main
    command: ingest --watch --heartbeat-file /data/ingest.heartbeat
    restart: unless-stopped
    environment:
      ROBOTSIX_CONFIG_FILE: /home/app/config/config.json
    volumes:
      - auto-mail-config:/home/app/config
      - auto-mail-data:/data
    labels:
      robotsix.deploy.config-target: "/home/app/config/config.json"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import os,time,sys;
          p='/data/ingest.heartbeat';
          sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<1800 else 1)"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  board:
    image: ghcr.io/damien-robotsix/robotsix-auto-mail:main
    # --host 0.0.0.0 is required: `serve` defaults to 127.0.0.1, which is
    # unreachable from the central-deploy gateway container and 502s every
    # proxied request.
    command: serve --host 0.0.0.0 --port 8080
    restart: unless-stopped
    environment:
      ROBOTSIX_CONFIG_FILE: /home/app/config/config.json
    ports:
      - "8080:8080"
    volumes:
      - auto-mail-config:/home/app/config
      - auto-mail-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health', timeout=3).status == 200 else 1)"
          || exit 1
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      robotsix.deploy.primary: "true"
      robotsix.deploy.config-target: "/home/app/config/config.json"

volumes:
  auto-mail-config:
    labels:
      robotsix.deploy.stateful: "true"
  auto-mail-data:
    labels:
      robotsix.deploy.stateful: "true"
