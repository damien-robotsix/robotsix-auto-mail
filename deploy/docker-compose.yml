# central-deploy-contract-version: 1

name: robotsix-auto-mail

services:
  ingester:
    image: ghcr.io/damien-robotsix/robotsix-auto-mail:main
    command: ingest --watch --heartbeat-file /home/mailbot/.data/ingest.heartbeat
    restart: unless-stopped
    environment:
      MAIL_CONFIG_PATH: /home/mailbot/config/config.yaml
    volumes:
      - auto-mail-config:/home/mailbot/config
      - auto-mail-data:/home/mailbot/.data
      - auto-mail-logs:/home/mailbot/.mail_log
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import os,time,sys;
          p='/home/mailbot/.data/ingest.heartbeat';
          sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<1800 else 1)"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  board:
    image: ghcr.io/damien-robotsix/robotsix-auto-mail:main
    command: serve --port 8080
    restart: unless-stopped
    environment:
      MAIL_CONFIG_PATH: /home/mailbot/config/config.yaml
    ports:
      - "8080:8080"
    volumes:
      - auto-mail-config:/home/mailbot/config
      - auto-mail-data:/home/mailbot/.data
      - auto-mail-logs:/home/mailbot/.mail_log
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz', timeout=3).status == 200 else 1)"
          || exit 1
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      robotsix.deploy.primary: "true"
      robotsix.deploy.config-target: "/home/mailbot/config/config.yaml"
      robotsix.deploy.config-assist: "detect {accounts.0.auth.username} --id {accounts.0.id} --overwrite --password {accounts.0.auth.password} --no-verify --output /home/mailbot/config/config.yaml"
      robotsix.deploy.config-assist-seeds: "accounts.0.auth.username,accounts.0.auth.password"

volumes:
  auto-mail-config:
    labels:
      robotsix.deploy.stateful: "true"
  auto-mail-data:
    labels:
      robotsix.deploy.stateful: "true"
  auto-mail-logs:
