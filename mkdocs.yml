site_name: robotsix-auto-mail
site_description: Automated mail ingestion, triage, and board for robotsix-auto-mail.
repo_url: https://github.com/damien-robotsix/robotsix-auto-mail
theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Ingestion: ingestion.md
  - Connecting: connecting.md
  - Configuration: configuration.md
  - Deployment: deployment.md
  - Board HTTP API: skill.md
  - Dependencies: dependencies.md
  - Testing: testing.md
  - Troubleshooting: troubleshooting.md
  - CodeQL Verification: codeql-verification.md
  - Contributing: CONTRIBUTING.md
  - Changelog: https://github.com/damien-robotsix/robotsix-auto-mail/blob/main/CHANGELOG.md
