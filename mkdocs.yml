site_name: robotsix-auto-mail
site_description: Automated mail ingestion, triage, and board for robotsix-auto-mail.
repo_url: https://github.com/damien-robotsix/robotsix-auto-mail
theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Agent Communication Architecture: agent-communication-architecture.md
  - Ingestion: ingestion.md
  - Connecting: connecting.md
  - Deployment: deployment.md
  - Dependencies: dependencies.md
  - Testing: testing.md
  - Troubleshooting: troubleshooting.md
  - CodeQL Verification: codeql-verification.md
  - Contributing: CONTRIBUTING.md
  - Changelog: CHANGELOG.md
  - Decisions:
      - 0001 — Programming language: decisions/0001-programming-language.md
