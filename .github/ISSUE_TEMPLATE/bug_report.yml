name: 🐛 Bug Report
about: Report a problem to help us improve
title: "[Bug]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        A clear and concise description of the bug.
        Include what you expected to happen and what actually happened.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal, self-contained steps to reproduce the behaviour.
      placeholder: |
        1. Configure ... with ...
        2. Run `uv run robotsix-auto-mail ...`
        3. See error: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant log output (with secrets redacted).
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Your runtime environment.
      placeholder: |
        - OS: (e.g. Ubuntu 24.04, macOS 15)
        - Python: 3.14
        - robotsix-auto-mail version: (e.g. 0.17.0, or commit SHA)
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (screenshots, config snippets, related issues).
