name: Weekly deps bump
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bump:
    uses: damien-robotsix/robotsix-mill/.github/workflows/deps-bump.yml@main
    with:
      pr-title: "chore(deps): weekly uv lock --upgrade"
      pr-body: |
        Automated weekly `uv lock --upgrade`: re-resolves the git
        `@main` sources to their latest commits and bumps PyPI deps
        within constraints.

        CI runs auto-mail's full suite on this PR so dependency-rev
        movement (e.g. a `robotsix-board` Protocol change) is caught
        before merge — never via silent `@main` drift.
      pr-labels: |
        dependencies
        automated
      branch-name: "deps/uv-lock-upgrade"
      commit-message: "chore(deps): weekly uv lock --upgrade"
    secrets:
      DEPS_BUMP_TOKEN: ${{ secrets.DEPS_BUMP_TOKEN }}
