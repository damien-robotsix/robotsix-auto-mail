name: Secret scanning
on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize]

permissions:
  security-events: write
  contents: read

concurrency:
  group: secret-scanning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        id: gitleaks
        continue-on-error: true
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:v8.30.1 detect \
            --source /repo \
            --report-path=/repo/gitleaks-report.sarif \
            --report-format=sarif \
            --verbose

      - name: Upload SARIF to GitHub Code Scanning
        if: steps.gitleaks.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks

      - name: Fail if leaks found
        if: steps.gitleaks.outcome == 'failure'
        run: exit 1
