name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  # Reusable Python-docs spine shared across robotsix repos. This single call
  # replaces the inline checkout / setup-uv / `uv sync` / git-identity / retry
  # `mkdocs gh-deploy` steps that used to be hand-rolled here. Unlike mill's own
  # caller (which installs a `docs` group), auto-mail's docs deps live in the
  # `docs` extra, so the install args pull `--extra docs`.
  deploy:
    name: Deploy docs
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-docs.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    permissions:
      contents: write  # needed to push gh-pages branch
    with:
      docs-install-args: "--extra docs"
