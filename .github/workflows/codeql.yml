name: CodeQL

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize]
  # Weekly baseline-drift scan; CodeQL queries evolve, so re-running on a
  # schedule catches newly-detectable issues even without code changes.
  schedule:
    - cron: "0 3 * * 1"

permissions:
  actions: read  # needed to read workflow run data
  contents: read
  security-events: write  # needed for SARIF upload

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/codeql.yml@7314c9b6c2b536ca81023e8841f272b72733262e  # main
    with:
      languages: python
      config-file: ./.github/codeql/codeql-config.yml
