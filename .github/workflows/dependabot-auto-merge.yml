name: Dependabot auto-merge

name: Dependabot auto-merge
on:
  pull_request:
# ...
jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'

permissions: {}

concurrency:
  group: dependabot-auto-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-merge:
    name: Auto-merge Dependabot PRs
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write  # needed to merge the PR
      pull-requests: write  # needed to approve and enable auto-merge
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/dependabot-auto-merge.yml@9ea2955d11f3d595a7a812feff99ae0eea8240c1  # main
