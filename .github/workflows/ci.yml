name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  # Reusable Python-CI spine shared across robotsix repos. This single call
  # replaces the inline ruff/mypy/deptry/pytest+coverage/bandit steps that used
  # to be hand-rolled here.
  ci:
    # python-ci.yml's `tests` job uploads SARIF, so it requests
    # security-events: write — a caller job must grant at least that or
    # GitHub rejects the call ("nested job 'tests' is requesting
    # 'security-events: write'"). Mirrors mill's own caller.
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-ci.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    with:
      python-version: "3.14"
      install-extras: "dev"
      cov-package: robotsix_auto_mail
      coverage-threshold: "80"
      mypy-advisory: false        # auto-mail runs `mypy --strict` as a BLOCKING gate; it must NOT become advisory
      run-deptry: true
      run-bandit: true
      pytest-args: --hypothesis-profile=ci -m "not docker" --cov-report=xml:coverage.xml

  # auto-mail-specific checks with no equivalent in the reusable spine. They
  # keep their own steps and stay blocking on every push + PR.
  repo-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/setup-project

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      # --frozen uses uv.lock as-is and FAILS if pyproject.toml was changed
      # without re-running `uv lock` — guaranteeing the committed lockfile is
      # the single source of truth for the resolved dependency tree.
      # --extra dev pulls the dev tooling (ruff/mypy/pytest/...) which lives
      # in [project.optional-dependencies]; uv does not install extras by
      # default.
      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Check for missing changelog fragment
        run: uv run --with towncrier towncrier check --compare-with HEAD^1
        if: github.event_name == 'pull_request'

      - name: Dependency vulnerability audit
        run: uv audit --frozen

      - name: Check config sync
        run: uv run --frozen python scripts/config/check_config_sync.py

      - name: Validate module taxonomy
        run: uv run --frozen robotsix-modules validate docs/modules.yaml

      - name: Check module registration completeness
        run: uv run --frozen robotsix-modules check-registration docs/modules.yaml --root .


      - name: Dead code detection (vulture)
        run: uv run --frozen vulture src/robotsix_auto_mail/ vulture_whitelist.py

      - name: Install Deno
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Resolve latest v2.x release via GitHub API (authenticated to avoid rate limiting on shared runners)
          V2_TAG=$(curl -sSf -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/denoland/deno/releases?per_page=30 \
            | python3 -c "import sys,json; [print(r['tag_name']) for r in json.load(sys.stdin) if r['tag_name'].startswith('v2.')]" \
            | head -1)
          echo "Installing Deno ${V2_TAG}"
          curl -fsSL "https://github.com/denoland/deno/releases/download/${V2_TAG}/deno-x86_64-unknown-linux-gnu.zip" -o deno.zip
          unzip -q deno.zip
          mkdir -p "$HOME/.deno/bin"
          mv deno "$HOME/.deno/bin/"
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: Lint JavaScript
        run: deno lint src/robotsix_auto_mail/server/static/board-auto-mail.js

      - name: Check JavaScript formatting
        run: deno fmt --check src/robotsix_auto_mail/server/static/board-auto-mail.js

      - name: Check CSS formatting
        run: deno fmt --check src/robotsix_auto_mail/server/static/board.css

      - name: Validate pyproject.toml (validate-pyproject)
        run: uvx 'validate-pyproject[all,store]'

      - name: Scan GitHub Actions workflows (zizmor)
        run: uv run --frozen zizmor --format=sarif .github/workflows/ > zizmor-results.sarif

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v3
        with:
          sarif_file: zizmor-results.sarif

  # Reusable Python-security spine shared across robotsix repos. This single
  # call replaces the inline TruffleHog secret-scan / pip-audit steps that
  # used to be hand-rolled here.
  security:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-security.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    with:
      python-version: "3.14"
      install-extras: "dev"
      # Full-checkout secret scan, matching the previous `path: ./` (no PR diff).
      run-trufflehog: true
      trufflehog-pr-diff: false
      # Locked-requirements audit: export uv.lock to this file, then run
      # `pip-audit -r`. Drops the four first-party VCS packages, which are not
      # on PyPI and break pip's --require-hashes mode. Also drops the root
      # project robotsix-auto-mail itself: its editable `-e .` form has no
      # hashable single file under pip's --require-hashes mode, which aborts
      # pip-audit.
      run-pip-audit: true
      pip-audit-requirements-file: requirements-locked.txt
      pip-audit-ignore-packages: "robotsix-config robotsix-board robotsix-auto-mail robotsix-llmio robotsix-modules"

  # Standalone CycloneDX SBOM of the full Python dependency tree (direct +
  # transitive), generated from uv.lock. Uploaded as a workflow artifact so
  # tools like Dependency-Track or OWASP Dependency-Check can consume it
  # independently of the container image.
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-project
      - name: Generate CycloneDX SBOM
        run: uv export --format cyclonedx1.5 --output-file sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cyclonedx-sbom
          path: sbom.cdx.json

  # Diff-scoped dependency review gate on pull requests. Uses GitHub's
  # dependency-review-action to (a) block PRs that add dependencies with known
  # CVEs rated moderate or higher and (b) deny strong-copyleft licenses
  # incompatible with this project's MIT license.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write       # needed for comment-summary-in-pr
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5
        with:
          fail-on-severity: moderate
          deny-licenses: >-
            GPL-2.0-only, GPL-2.0-or-later,
            GPL-3.0-only, GPL-3.0-or-later,
            AGPL-3.0-only, AGPL-3.0-or-later,
            LGPL-2.1-only, LGPL-2.1-or-later,
            LGPL-3.0-only, LGPL-3.0-or-later
          comment-summary-in-pr: true

  # PR-only job: posts a per-file coverage diff PR comment.  This is
  # INFORMATIONAL — the actual blocking coverage gate is --cov-fail-under=80
  # inside the reusable, enforced in the `ci` job above.
  #
  # The reusable python-ci.yml workflow does not upload coverage artifacts,
  # so this job generates its own .coverage + coverage.xml from a fresh test
  # run.  Running the full suite twice is wasteful but the only way to get
  # per-file diff commentary without modifying the shared reusable workflow.
  coverage-comment:
    if: github.event_name == 'pull_request'
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0    # full history needed for coverage diff

      - uses: ./.github/actions/setup-project

      - name: Install dev deps
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv sync --frozen --extra dev

      - name: Generate coverage data
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          uv run --with pytest-xdist --with pytest-cov pytest tests/ \
            -n auto --dist loadscope \
            --hypothesis-profile=ci \
            -m "not docker" \
            --cov=robotsix_auto_mail \
            --cov-report=xml:coverage.xml \
            --tb=long

      - name: Post coverage PR comment
        uses: py-cov-action/python-coverage-comment-action@50d15ff8768f6d897b04e5a0805bd1a98f7096c4  # v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MERGE_COVERAGE_FILES: false

      - name: Generate HTML coverage report
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run coverage html --directory=coverage_html

      - name: Upload HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-html-report
          path: coverage_html/
          retention-days: 7
