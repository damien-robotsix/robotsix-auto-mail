name: Release image

# Publishes container images to GHCR via the shared docker-release
# reusable workflow in robotsix-mill, then runs a Trivy vulnerability
# scan with SARIF upload to Code Scanning.
#
# Tags produced by the reusable (see docker-release.yml in robotsix-mill):
#   push to `main`  -> `main`, `sha-<short>`, `latest`
#   push of a `v*` tag -> `1.2.3`, `sha-<short>`
on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write        # required for provenance/SBOM attestation signing
  attestations: write
  security-events: write  # required for SARIF upload to code scanning

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/docker-release.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write  # reusable docker-release.yml uploads Trivy SARIF (caller must grant)

  trivy:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Compute image reference
        id: ref
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_TYPE" = "tag" ]; then
            TAG="$REF_NAME"
            TAG="${TAG#v}"
          else
            TAG="$REF_NAME"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Scan published image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.ref.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-project
      - name: Generate CycloneDX SBOM
        run: uv export --format cyclonedx --output-file sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: cyclonedx-sbom
          path: sbom.cdx.json

  release-notes:
    needs: [publish, sbom]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Download SBOM artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: cyclonedx-sbom

      - name: Extract release notes from CHANGELOG
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="$REF_NAME"
          VERSION="${TAG#v}"
          # Extract the section for this version; if none found, use the
          # "unreleased" section as fallback.
          awk -v ver="${VERSION}" '
            /^## / { if (found) exit; if ($0 ~ ver) found=1; next }
            found { print }
          ' CHANGELOG.md > /tmp/release_body.md
          if [ ! -s /tmp/release_body.md ]; then
            echo "No changelog section for ${VERSION} — using unreleased section"
            awk '
              /^## 0\.0\.0 \(unreleased\)/ { found=1; next }
              found && /^## [0-9]/ { exit }
              found
            ' CHANGELOG.md > /tmp/release_body.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          body_path: /tmp/release_body.md
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }}"
          files: sbom.cdx.json
