name: Release image

# Publishes container images to GHCR via the shared docker-release
# reusable workflow in robotsix-mill, then runs a Trivy vulnerability
# scan with SARIF upload to Code Scanning.
#
# Tags produced by the reusable (see docker-release.yml in robotsix-mill):
#   push to `main`  -> `main`, `sha-<short>`, `latest`
#   push of a `v*` tag -> `1.2.3`, `sha-<short>`
on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write        # required for provenance/SBOM attestation signing
  attestations: write
  security-events: write  # required for SARIF upload to code scanning

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    uses: damien-robotsix/robotsix-mill/.github/workflows/docker-release.yml@main
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

  trivy:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Compute image reference
        id: ref
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            TAG="${TAG#v}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Scan published image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.ref.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
