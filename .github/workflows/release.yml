name: Release image

# Publishes container images to GHCR using the Docker daemon's
# built-in BuildKit (`docker` driver) to avoid pulling the
# `moby/buildkit` image from Docker Hub (which causes transient
# timeouts under Docker Hub rate-limiting).
#
# Tags produced:
#   push to `main`  -> `main`, `sha-<short>`, `latest`
#   push of a `v*` tag -> `1.2.3`, `sha-<short>`
on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed to push container image to GHCR
      id-token: write  # needed for provenance/SBOM attestation signing
      attestations: write  # needed for provenance/SBOM attestation signing
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
        with:
          driver: docker  # Use Docker daemon's built-in BuildKit — avoids pulling moby/buildkit from Docker Hub

      - name: Log into GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=min
          sbom: true

  trivy:
    name: Scan image with Trivy
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read  # needed to pull image from GHCR
      security-events: write  # needed for SARIF upload
    steps:
      - name: Compute image reference
        id: ref
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_TYPE" = "tag" ]; then
            TAG="$REF_NAME"
            TAG="${TAG#v}"
          else
            TAG="$REF_NAME"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Scan published image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.ref.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # Fail the step only for tag (release) pushes — branch
          # pushes still scan and upload SARIF but don't fail.
          exit-code: ${{ github.ref_type == 'tag' && '1' || '0' }}
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-project
      - name: Generate CycloneDX SBOM
        run: uv export --format cyclonedx1.5 --output-file sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cyclonedx-sbom
          path: sbom.cdx.json

  release-notes:
    name: Create GitHub Release
    needs: [publish, sbom]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create the GitHub Release
      actions: read  # needed to download workflow artifacts
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-project

      - name: Compile changelog fragments
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          uv run --with towncrier towncrier build --yes --version "${VERSION}"

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: cyclonedx-sbom

      - name: Extract release notes from CHANGELOG
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="$REF_NAME"
          VERSION="${TAG#v}"
          # Extract the section for this version; if none found, use the
          # "unreleased" section as fallback.
          awk -v ver="${VERSION}" '
            /^## / { if (found) exit; if ($0 ~ ver) found=1; next }
            found { print }
          ' CHANGELOG.md > /tmp/release_body.md
          if [ ! -s /tmp/release_body.md ]; then
            echo "No changelog section for ${VERSION} — using unreleased section"
            awk '
              /^## 0\.0\.0 \(unreleased\)/ { found=1; next }
              found && /^## [0-9]/ { exit }
              found
            ' CHANGELOG.md > /tmp/release_body.md
          fi

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" sbom.cdx.json \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release_body.md \
            --generate-notes
