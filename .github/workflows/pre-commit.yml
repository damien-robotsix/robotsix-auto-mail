name: pre-commit

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1
        with:
          extra_args: --all-files --verbose
        env:
          # Skip hooks already enforced by the reusable python-ci spine
          # (ruff/ruff-format/mypy/bandit), the repo-checks job
          # (hadolint-docker/check-config-sync/robotsix-modules-validate),
          # or dedicated workflows (gitleaks-docker via secret-scanning.yml),
          # leaving this job responsible only for the hooks with no other
          # CI coverage: file-hygiene, private-key, large-files.
          SKIP: ruff,ruff-format,mypy,bandit,hadolint-docker,check-config-sync,robotsix-modules-validate,vulture,deno-lint,deno-fmt,gitleaks-docker
