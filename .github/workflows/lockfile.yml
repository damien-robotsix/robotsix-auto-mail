name: Update uv.lock

# Keep uv.lock in sync automatically: whenever pyproject.toml changes on
# main, re-resolve the lockfile and commit it back. This means a
# pyproject.toml edit never leaves the committed lockfile stale (which the
# CI `uv sync --frozen` gate would otherwise reject on the next PR).
on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: write

# Avoid overlapping runs racing to push the lockfile.
concurrency:
  group: update-uv-lock
  cancel-in-progress: true

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-project

      - name: Re-resolve lockfile
        run: uv lock

      - name: Commit updated lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- uv.lock; then
            echo "uv.lock already up to date — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add uv.lock
          git commit -m "chore: refresh uv.lock after pyproject.toml change"
          git push
