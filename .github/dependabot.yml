version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      # hatchling is the build backend; it appears in both [build-system]
      # requires and [project.optional-dependencies] dev without version
      # constraints, which causes Dependabot's uv file updater to fail with
      # "No files have changed!" (RuntimeError).  Ignore it until the
      # upstream uv updater can handle dual-occurrence unpinned deps.
      - dependency-name: "hatchling"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: weekly
