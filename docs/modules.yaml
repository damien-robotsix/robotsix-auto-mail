# Canonical module taxonomy for robotsix-auto-mail.
#
# Each module declares an id, a human-readable description, and the
# set of repo-relative file paths it owns.  Every file in the repo
# must belong to exactly one module.  Paths use forward slashes.
#
# This file is the source of truth for drift detection: any file not
# listed here is "unclassified"; any listed path that no longer exists
# is "stale"; any new module proposal must start by adding an entry here.

modules:
  - id: core
    description: >-
      Project root, package identity, build configuration, and roadmap.
    paths:
      - .mail_data/.gitkeep
      - .mail_log/.gitkeep
      - src/robotsix_auto_mail/__init__.py
      - src/robotsix_auto_mail/format.py
      - tests/core/test_format.py
      - pyproject.toml
      - uv.lock
      - .gitignore
      - .python-version
      - LICENSE
      - CLAUDE.md
      - README.md
      - SECURITY.md
      - ROADMAP.md
      - tests/__init__.py
      - tests/conftest.py
      - tests/test_stub.py

  - id: docker
    description: >-
      Docker image definition, Compose orchestration, and
      container entrypoint.
    paths:
      - .dockerignore
      - Dockerfile
      - docker-compose.yml
      - entrypoint.sh

  - id: dev
    description: >-
      Developer and deployment helper scripts.
    paths:
      - dev/auto-mail-autoupdate.sh

  - id: cli
    description: >-
      CLI entry point exposing probe and ingest subcommands.
    paths:
      - src/robotsix_auto_mail/cli.py
      - tests/cli/test_cli.py

  - id: config
    description: >-
      Configuration loading (YAML file + env), config template,
      the deterministic drift-detection script, and the optional
      LLM-driven drift-advisory agent. Together they keep the
      MailConfig dataclass, env example, YAML example, and
      connecting docs in sync.
    paths:
      - src/robotsix_auto_mail/config/__init__.py
      - src/robotsix_auto_mail/config/config_sync_agent.py
      - tests/config/test_config.py
      - .env.example
      - config/.gitkeep
      - config/mail.local.example.yaml
      - scripts/config/check_config_sync.py
      - tests/config/test_config_sync.py
      - tests/config/test_config_sync_agent.py

  - id: triage
    description: >-
      LLM-driven inbox triage agent and local triage-decision
      persistence: classifies inbox mail into advisory action statuses
      (answer / archive / delete / ignore / user_triage) stored in the
      triage_decisions table without moving mail in the mailbox.
    paths:
      - src/robotsix_auto_mail/triage/__init__.py
      - tests/triage/test_triage.py

  - id: db
    description: >-
      SQLite datastore: schema, MailRecord, insert, watermark.
    paths:
      - src/robotsix_auto_mail/db.py
      - tests/db/test_db.py

  - id: detect
    description: >-
      MX-record provider detection and auto-configuration lookup
      (Mozilla ISPDB, autoconfig XML, LLM fallback).
    paths:
      - src/robotsix_auto_mail/detect.py
      - tests/detect/test_detect.py

  - id: archive
    description: >-
      Self-managed archive folder structure: first-run LLM layout
      proposal rooted at robotsix-mail-archive, remembered via the
      watermark table.
    paths:
      - src/robotsix_auto_mail/archive.py
      - tests/archive/test_archive.py

  - id: protocol
    description: >-
      Shared protocol-client base class: common TLS-mode dispatch
      and config fields for the IMAP and SMTP clients.
    paths:
      - src/robotsix_auto_mail/_base_client.py
      - tests/protocol/test_base_client.py

  - id: imap
    description: >-
      Low-level IMAP client (stdlib imaplib wrapper).
    paths:
      - src/robotsix_auto_mail/imap.py
      - tests/imap/test_imap.py

  - id: parser
    description: >-
      MIME to MailRecord parsing.
    paths:
      - src/robotsix_auto_mail/parser.py
      - tests/parser/test_parser.py

  - id: pipeline
    description: >-
      Ingestion orchestration: fetch, parse, store, watermark.
    paths:
      - src/robotsix_auto_mail/pipeline.py
      - tests/pipeline/test_pipeline.py

  - id: smtp
    description: >-
      SMTP sending client.
    paths:
      - src/robotsix_auto_mail/smtp_client.py
      - tests/smtp/test_smtp_client.py

  - id: tracing
    description: >-
      Langfuse observability via robotsix_llmio's OTel layer: initialises
      the tracer provider and wraps each LLM call site (detect, archive,
      triage, config_sync_agent) with named root spans carrying input and
      output attribution.
    paths:
      - src/robotsix_auto_mail/tracing.py
      - tests/tracing/test_tracing.py

  - id: logging
    description: >-
      Central structlog-based logging configuration: env-driven
      setup_logging() entry point bridging stdlib logging into a
      shared JSON/console renderer.
    paths:
      - src/robotsix_auto_mail/logging_config.py
      - tests/logging_config/test_logging_config.py

  - id: server
    description: >-
      HTTP kanban board server exposing the mail database as
      a read/write web UI.
    paths:
      - src/robotsix_auto_mail/server.py
      - src/robotsix_auto_mail/static/board.css
      - tests/server/test_server.py

  - id: docs
    description: >-
      User-facing documentation and architecture decisions.
    paths:
      - docs/CHANGELOG.md
      - docs/CONTRIBUTING.md
      - docs/index.md
      - mkdocs.yml
      - docs/architecture.md
      - docs/connecting.md
      - docs/deployment.md
      - docs/ingestion.md
      - docs/testing.md
      - docs/troubleshooting.md
      - docs/modules.yaml
      - docs/modules.schema.yaml
      - docs/decisions/0001-programming-language.md

  - id: ci
    description: >-
      CI and developer-side quality-gate tooling: GitHub Actions
      workflows (main pipeline and uv.lock auto-update), dependency
      updates, and local pre-commit hooks (including the
      detect-secrets baseline).
    paths:
      - .github/codeql/codeql-config.yml
      - .github/workflows/ci.yml
      - .github/workflows/codeql.yml
      - .github/workflows/docs.yml
      - .github/workflows/lockfile.yml
      - .github/workflows/release.yml
      - .pre-commit-config.yaml
      - .secrets.baseline
      - renovate.json
      - scripts/modules/check_module_registration.py
      - tests/modules/test_module_registration.py

  - id: mill
    description: >-
      Robotsix-mill board orchestration configuration: board settings
      and the periodic scheduled-agent task definitions that drive the
      autonomous workflow.
    paths:
      - .robotsix-mill/config.yaml
      - .robotsix-mill/periodic/audit.yaml
      - .robotsix-mill/periodic/bc_check.yaml
      - .robotsix-mill/periodic/board_cleanup.yaml
      - .robotsix-mill/periodic/data_dir_audit.yaml
      - .robotsix-mill/periodic/completeness_check.yaml
      - .robotsix-mill/periodic/copy_paste.yaml
      - .robotsix-mill/periodic/health.yaml
      - .robotsix-mill/periodic/langfuse_cleanup.yaml
      - .robotsix-mill/periodic/module_curator.yaml
      - .robotsix-mill/periodic/survey.yaml
      - .robotsix-mill/periodic/cost_reconciliation.yaml
      - .robotsix-mill/periodic/test_gap.yaml
      - .robotsix-mill/periodic/trace_review.yaml
