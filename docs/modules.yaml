      - src/robotsix_auto_mail/db/queries.py
      - tests/db/test_archive.py
      - tests/db/test_db.py
      - tests/db/test_migrate.py

  - id: detect
    description: >-
      MX-record provider detection and auto-configuration lookup
      (Mozilla ISPDB, autoconfig XML, LLM fallback).
    paths:
      - src/robotsix_auto_mail/detect/__init__.py
      - src/robotsix_auto_mail/detect/detector.py
      - src/robotsix_auto_mail/detect/models.py
      - tests/detect/test_detect.py

  - id: calendar
    description: >-
      Calendar event dispatch to the robotsix-calendar agent over the
      robotsix_agent_comm broker, triggered by moving a mail into the
      TO_CALENDAR board column. Sends a structured add_to_calendar request
      and persists the correlated event reference (or error) onto the card.
    paths:
      - src/robotsix_auto_mail/calendar/__init__.py
      - src/robotsix_auto_mail/calendar/dispatch.py
      - src/robotsix_auto_mail/calendar/schema.py
      - src/robotsix_auto_mail/calendar/transport.py
      - tests/calendar/conftest.py
      - tests/calendar/test_calendar.py
      - tests/calendar/test_transport.py

  - id: imap
    description: >-
