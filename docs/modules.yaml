# Canonical module taxonomy for robotsix-auto-mail.
#
# Each module declares an id, a human-readable description, and the
# set of repo-relative file paths it owns.  Every file in the repo
# must belong to exactly one module.  Paths use forward slashes.
#
# This file is the source of truth for drift detection: any file not
# listed here is "unclassified"; any listed path that no longer exists
# is "stale"; any new module proposal must start by adding an entry here.

modules:
  - id: core
    description: >-
      Project root, package identity, build configuration, and roadmap.
    paths:
      - .mail_data/.gitkeep
      - .mail_log/.gitkeep
      - src/robotsix_auto_mail/__init__.py
      - src/robotsix_auto_mail/py.typed
      - src/robotsix_auto_mail/_constants.py
      - src/robotsix_auto_mail/_llm_agent.py
      - src/robotsix_auto_mail/format.py
      - tests/core/test_format.py
      - tests/core/test_llm_agent.py
      - pyproject.toml
      - uv.lock
      - vulture_whitelist.py
      - .gitignore
      - .python-version
      - CHANGELOG.md
      - LICENSE
      - AGENT.md
      - CLAUDE.md
      - README.md
      - SECURITY.md
      - ROADMAP.md
      - tests/__init__.py
      - tests/conftest.py
      - tests/test_stub.py

  - id: docker
    description: >-
      Docker image definition, Compose orchestration, and
      container entrypoint.
    paths:
      - .dockerignore
      - Dockerfile
      - docker-compose.yml
      - entrypoint.sh

  - id: deploy
    description: >-
      Continuous-deployment stack for server.robotsix.net: a Compose
      file that pulls the published GHCR image and runs the ingester,
      the loopback-bound board, and Watchtower (auto-update on a new
      `main` image), an nginx TLS + basic-auth reverse-proxy vhost for
      mail.robotsix.net, plus the env example and operator runbook.
    paths:
      - deploy/.env.example
      - deploy/README.md
      - deploy/docker-compose.yml
      - deploy/nginx/mail.robotsix.net.conf

  - id: dev
    description: >-
      Developer and deployment helper scripts.
    paths:
      - scripts/dev/auto-mail-autoupdate.sh
      - src/robotsix_auto_mail/dev/__init__.py
      - src/robotsix_auto_mail/dev/autoupdate.py
      - tests/dev/test_autoupdate.py

  - id: cli
    description: >-
      CLI entry point exposing probe, ingest, board, serve, detect,
      config-sync, triage, migrate-config, and auth subcommands.
    paths:
      - src/robotsix_auto_mail/cli/__init__.py
      - src/robotsix_auto_mail/cli/commands.py
      - src/robotsix_auto_mail/cli/commands_auth.py
      - src/robotsix_auto_mail/cli/commands_board.py
      - src/robotsix_auto_mail/cli/commands_config_sync.py
      - src/robotsix_auto_mail/cli/commands_detect.py
      - src/robotsix_auto_mail/cli/commands_ingest.py
      - src/robotsix_auto_mail/cli/commands_migrate.py
      - src/robotsix_auto_mail/cli/commands_probe.py
      - src/robotsix_auto_mail/cli/commands_serve.py
      - src/robotsix_auto_mail/cli/commands_triage.py
      - src/robotsix_auto_mail/cli/config.py
      - tests/cli/test_cli.py
      - tests/cli/test_cli_board.py
      - tests/cli/test_cli_config.py
      - tests/cli/test_cli_config_sync.py
      - tests/cli/test_cli_detect.py
      - tests/cli/test_cli_ingest.py
      - tests/cli/test_cli_migrate.py
      - tests/cli/test_cli_probe.py
      - tests/cli/test_cli_refine.py
      - tests/cli/test_cli_triage.py

  - id: config
    description: >-
      Configuration loading (YAML file + env), config template,
      the deterministic drift-detection script, and the optional
      LLM-driven drift-advisory agent. Together they keep the
      MailConfig dataclass, env example, YAML example, and
      connecting docs in sync. Also covers multi-account loading
      (MailAccountsConfig) and per-account SQLite DB isolation.
    paths:
      - src/robotsix_auto_mail/config/__init__.py
      - src/robotsix_auto_mail/config/loader.py
      - src/robotsix_auto_mail/config/model.py
      - src/robotsix_auto_mail/config/render.py
      - src/robotsix_auto_mail/config/schema.py
      - src/robotsix_auto_mail/config/config_sync_agent.py
      - tests/config/test_mailconfig_basics.py
      - tests/config/test_config_from_env.py
      - tests/config/test_config_from_yaml.py
      - tests/config/test_config_load.py
      - tests/config/test_config_llm.py
      - tests/config/test_config_ingest.py
      - tests/config/test_config_archive.py
      - tests/config/test_config_triage.py
