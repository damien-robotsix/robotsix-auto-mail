# central-deploy-contract-version: 1
# -------------------------------------------------------------------------
# robotsix-auto-mail — Docker Compose file with ingester + board services.
#
# `docker compose up -d` runs the full stack:
#   - robotsix-auto-mail : long-running ingester (fetches new mail on an
#     interval set by ingest.interval_minutes in config, default 15 min)
#   - board              : the read-only web board at
#     http://localhost:${BOARD_PORT:-8080}/board
#
# One-shot commands override the default command via `docker compose run`:
#
#     docker compose run robotsix-auto-mail probe
#     docker compose run robotsix-auto-mail detect you@example.com
#     docker compose run robotsix-auto-mail ingest          # single pass
#
# Configuration is delivered via a JSON config file bind-mounted from the
# host ./config directory.  The only environment variable set here points
# the application at the mounted config file.  All secrets live in the
# git-ignored config/config.json.
# -------------------------------------------------------------------------

services:
  robotsix-auto-mail:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/damien-robotsix/robotsix-auto-mail:${IMAGE_TAG:-main}
    stdin_open: true
    tty: false
    restart: unless-stopped

    # Default: run the periodic ingester. `docker compose run … <cmd>`
    # overrides this for one-shot commands (probe, detect, ingest, …).
    command: ingest --watch

    environment:
      ROBOTSIX_CONFIG_FILE: /home/app/config/config.json

    volumes:
      # Config bind-mount — YAML files available without image rebuild.
      - ./config:/home/app/config
      # Data bind-mount — the SQLite database lives in ./.mail_data on the
      # host (git-ignored), mounted at /data inside the container.
      - ./.mail_data:/data

    # The ingester runs no HTTP server, so the image's HTTP healthcheck
    # (GET :8080/health) can never pass — disable it for this service.
    healthcheck:
      disable: true

  # -----------------------------------------------------------------------
  # board — long-running kanban-board daemon
  # -----------------------------------------------------------------------
  board:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/damien-robotsix/robotsix-auto-mail:${IMAGE_TAG:-main}
    # Always serve on 8080 inside the container so the image healthcheck
    # (GET :8080/health) passes; BOARD_PORT only remaps the host side.
    # --host 0.0.0.0 is required: `serve` defaults to 127.0.0.1, which is
    # unreachable from other containers (e.g. the central-deploy gateway
    # proxying mail.<domain> → this container) and 502s every request.
    command: serve --host 0.0.0.0 --port 8080
    labels:
      robotsix.deploy.primary: "true"
    restart: unless-stopped

    environment:
      ROBOTSIX_CONFIG_FILE: /home/app/config/config.json

    ports:
      - "${BOARD_PORT:-8080}:8080"

    volumes:
      - ./config:/home/app/config
      - ./.mail_data:/data
