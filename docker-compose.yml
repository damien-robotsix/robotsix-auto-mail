# -------------------------------------------------------------------------
# robotsix-auto-mail — Docker Compose file with ingester + board services.
#
# `docker compose up -d` runs the full stack:
#   - robotsix-auto-mail : long-running ingester (fetches new mail on an
#     interval set by ingest.interval_minutes in config, default 15 min)
#   - board              : the read-only web board at
#     http://localhost:${BOARD_PORT:-8078}/board
#
# One-shot commands override the default command via `docker compose run`:
#
#     docker compose run robotsix-auto-mail probe
#     docker compose run robotsix-auto-mail detect you@example.com
#     docker compose run robotsix-auto-mail ingest          # single pass
#
# Configuration is delivered via YAML files bind-mounted from the host
# ./config directory.  The only environment variable set here points the
# application at the mounted config file.  All secrets live in the
# git-ignored config/mail.local.yaml.
# -------------------------------------------------------------------------

services:
  robotsix-auto-mail:
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    tty: false
    restart: unless-stopped

    # Default: run the periodic ingester. `docker compose run … <cmd>`
    # overrides this for one-shot commands (probe, detect, ingest, …).
    command: ingest --watch

    environment:
      MAIL_CONFIG_PATH: /home/mailbot/config/mail.local.yaml
      LLM_API_KEY: ${LLM_API_KEY:-}

    volumes:
      # Config bind-mount — YAML files available without image rebuild.
      - ./config:/home/mailbot/config
      # Data bind-mount — the SQLite database lives in ./.mail_data on the
      # host (git-ignored), mounted at the default store location
      # (.data, under WORKDIR) inside the container.
      - ./.mail_data:/home/mailbot/.data
      # Log bind-mount — persistent debug logs survive container restarts.
      - ./.mail_log:/home/mailbot/.mail_log

  # -----------------------------------------------------------------------
  # board — long-running kanban-board daemon
  # -----------------------------------------------------------------------
  board:
    build:
      context: .
      dockerfile: Dockerfile
    command: serve --port ${BOARD_PORT:-8078}
    restart: on-failure

    environment:
      MAIL_CONFIG_PATH: /home/mailbot/config/mail.local.yaml

    ports:
      - "${BOARD_PORT:-8078}:${BOARD_PORT:-8078}"

    volumes:
      - ./config:/home/mailbot/config
      - ./.mail_data:/home/mailbot/.data
      - ./.mail_log:/home/mailbot/.mail_log
