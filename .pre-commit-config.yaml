repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # keep in sync with pyproject.toml dev deps
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    # keep in sync with pyproject.toml dev deps
    rev: v2.1.0
    hooks:
      - id: mypy
        args: [.]
        pass_filenames: false
        additional_dependencies:
          - pyyaml>=6.0.3
          - pydantic>=2.13.4
          - urllib3>=2.7.0
          - types-PyYAML

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
        additional_dependencies:
          - validate-pyproject-schema-store[all]

  # robotsix-modules ships a CLI but no .pre-commit-hooks.yaml manifest, so it
  # cannot be consumed as a remote hook repo (pre-commit fails env init with
  # InvalidManifestError). Run its validator as a local hook against the
  # dev-installed package (kept in sync with uv.lock).
  - repo: local
    hooks:
      - id: robotsix-modules-validate
        name: Validate module taxonomy
        entry: uv run --frozen robotsix-modules validate
        language: system
        pass_filenames: true
        files: ^docs/modules\.yaml$

      - id: vulture
        name: Dead code detection (vulture)
        entry: uv run --frozen vulture src/robotsix_auto_mail/ vulture_whitelist.py
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
      - id: check-executables-have-shebangs

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        args: [-shellcheck=]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.6.0
    hooks:
      - id: zizmor
        args: [--format=sarif, .github/workflows/]


  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline", "--exclude-files", "^tests/"]

  - repo: https://github.com/hadolint/hadolint
    rev: 57e1618d78fd469a92c1e584e8c9313024656623  # frozen: v2.14.0
    hooks:
      - id: hadolint-docker
        args: [--failure-threshold, warning]

  - repo: local
    hooks:
      - id: check-config-sync
        name: Check config sync
        entry: uv run --frozen python scripts/config/check_config_sync.py
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/thibaudcolas/pre-commit-stylelint
    rev: v17.14.0
    hooks:
      - id: stylelint
        args: [--fix]
        additional_dependencies:
          - stylelint@17.14.0
          - stylelint-config-standard
          - stylelint-declaration-strict-value

  - repo: local
    hooks:
      - id: deno-lint
        name: Lint JavaScript (deno)
        entry: deno lint --quiet
        language: system
        types: [javascript]
        files: ^src/robotsix_auto_mail/server/static/.*\.js$

      - id: deno-fmt
        name: Format JavaScript / CSS (deno fmt)
        entry: deno fmt --check
        language: system
        types: [javascript, css]
        files: ^src/robotsix_auto_mail/server/static/.*\.(js|css)$
