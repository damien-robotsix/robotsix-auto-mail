title = "robotsix-auto-mail secret scanning config"

[extend]
useDefault = true

[[allowlists]]
description = "Global Python project exclusions"
regexTarget = "match"
paths = [
  '''\.venv/''',
  '''__pycache__/''',
  '''\.pytest_cache/''',
  '''build/''',
  '''dist/''',
  '''\*.egg-info/''',
  '''uv\.lock''',
  '''changelog/''',
  '''\.gitleaks-baseline\.json'''
]
